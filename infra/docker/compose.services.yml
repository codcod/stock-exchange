# Application services — all six microservices.
# Requires the 'exchange' network created by compose.infra.yml.
# Run with: just services-up   (after just infra-up)
#        or: just up            (starts infra + services together)

name: exchange

networks:
  default:
    name: exchange
    external: true

services:
  # ---------------------------------------------------------------------------
  # Tier 1: no service dependencies — only Postgres
  # ---------------------------------------------------------------------------

  risk-engine:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m services.risk_engine
    environment:
      DATABASE_URL: postgresql+asyncpg://exchange:exchange@postgres:5432/exchange
      CLEARING_URL: http://clearing:8004
      PORT: "8002"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      clearing:
        condition: service_healthy

  market-data:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m services.market_data
    environment:
      PORT: "8005"
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Tier 2: clearing (owns account state — notifies Risk Engine on changes)
  # ---------------------------------------------------------------------------

  clearing:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m services.clearing
    environment:
      DATABASE_URL: postgresql+asyncpg://exchange:exchange@postgres:5432/exchange
      PORT: "8004"
      RISK_ENGINE_URL: http://risk-engine:8002
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Tier 3: order management (calls Clearing for reservations)
  # ---------------------------------------------------------------------------

  order-management:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m services.order_management
    environment:
      DATABASE_URL: postgresql+asyncpg://exchange:exchange@postgres:5432/exchange
      PORT: "8001"
      RISK_ENGINE_URL: http://risk-engine:8002
      MATCHING_ENGINE_URL: http://matching-engine:8003
      CLEARING_URL: http://clearing:8004
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      risk-engine:
        condition: service_healthy
      clearing:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Tier 4: matching engine (restores open orders from OMS on startup)
  # ---------------------------------------------------------------------------

  matching-engine:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m services.matching_engine
    environment:
      DATABASE_URL: postgresql+asyncpg://exchange:exchange@postgres:5432/exchange
      PORT: "8003"
      CLEARING_URL: http://clearing:8004
      ORDER_MANAGEMENT_URL: http://order-management:8001
      MARKET_DATA_URL: http://market-data:8005
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      order-management:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Tier 5: HTTP gateway (public entry point)
  # ---------------------------------------------------------------------------

  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m services.gateway
    environment:
      PORT: "8000"
      ORDER_MANAGEMENT_URL: http://order-management:8001
      RISK_ENGINE_URL: http://risk-engine:8002
      MATCHING_ENGINE_URL: http://matching-engine:8003
      CLEARING_URL: http://clearing:8004
      MARKET_DATA_URL: http://market-data:8005
    ports:
      - "8000:8000"
    depends_on:
      order-management:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
      market-data:
        condition: service_healthy
