# Minimal infrastructure for the exchange.
# The exchange itself runs in-process (no HTTP services yet),
# so this is mostly here for when you add a persistent DB or
# a real message broker later.

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: exchange
      POSTGRES_DB: exchange
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/docker

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   command: redis-server --save 60 1

volumes:
  postgres-data:
